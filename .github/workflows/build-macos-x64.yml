name: Build macOS x64 (Intel)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: build-macos-x64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-x64:
    runs-on: macos-latest  # arm64 runner; cross-compile x64 via electron-builder --x64
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: bun install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare SDK and dependencies for Electron
        run: |
          echo "=== Preparing SDK and dependencies ==="
          ELECTRON_DIR="apps/electron"
          ROOT_DIR="."

          # 1. Copy SDK core
          SDK_SOURCE="$ROOT_DIR/node_modules/@anthropic-ai/claude-agent-sdk"
          if [ ! -d "$SDK_SOURCE" ]; then
            echo "ERROR: SDK core not found at $SDK_SOURCE"
            exit 1
          fi
          echo "Copying SDK core..."
          mkdir -p "$ELECTRON_DIR/node_modules/@anthropic-ai"
          rm -rf "$ELECTRON_DIR/node_modules/@anthropic-ai/claude-agent-sdk"
          cp -r "$SDK_SOURCE" "$ELECTRON_DIR/node_modules/@anthropic-ai/"

          # 2. Copy/resolve SDK binary for x64
          # On arm64 runner, the x64 binary won't be in node_modules, so fetch it
          SDK_BIN_PKG="claude-agent-sdk-darwin-x64"
          SDK_BIN_SOURCE="$ROOT_DIR/node_modules/@anthropic-ai/$SDK_BIN_PKG"
          if [ ! -d "$SDK_BIN_SOURCE" ]; then
            echo "Cross-arch build: $SDK_BIN_PKG not in node_modules — fetching from npm..."
            SDK_VERSION=$(node -p "require('./package.json').dependencies['@anthropic-ai/claude-agent-sdk']" | tr -d '"')
            PKG_TMP=$(mktemp -d)
            cd "$PKG_TMP"
            npm pack "@anthropic-ai/${SDK_BIN_PKG}@${SDK_VERSION}" >/dev/null
            TARBALL=$(ls anthropic-ai-*.tgz | head -1)
            tar -xzf "$TARBALL"
            cd - > /dev/null
            SDK_BIN_SOURCE="$PKG_TMP/package"
          fi

          echo "Staging SDK native binary as claude-agent-sdk-binary alias..."
          ALIAS_DEST="$ELECTRON_DIR/node_modules/@anthropic-ai/claude-agent-sdk-binary"
          rm -rf "$ALIAS_DEST"
          mkdir -p "$ALIAS_DEST"
          cp -r "$SDK_BIN_SOURCE/." "$ALIAS_DEST/"
          chmod +x "$ALIAS_DEST/claude" 2>/dev/null || true

          # Sanity check
          if [ -f "$ALIAS_DEST/claude" ]; then
            BIN_SIZE=$(stat -c%s "$ALIAS_DEST/claude" 2>/dev/null || stat -f%z "$ALIAS_DEST/claude" 2>/dev/null || echo "0")
            echo "  Native binary: $((BIN_SIZE / 1024 / 1024)) MB"
          else
            echo "WARNING: claude binary not found in SDK binary package"
          fi

          # 3. Copy ripgrep
          RG_SOURCE="$ROOT_DIR/node_modules/@vscode/ripgrep"
          if [ -d "$RG_SOURCE" ]; then
            echo "Copying @vscode/ripgrep..."
            mkdir -p "$ELECTRON_DIR/node_modules/@vscode"
            rm -rf "$ELECTRON_DIR/node_modules/@vscode/ripgrep"
            cp -r "$RG_SOURCE" "$ELECTRON_DIR/node_modules/@vscode/"
          else
            echo "WARNING: @vscode/ripgrep not found"
          fi

          # 4. Copy interceptor sources
          INTERCEPTOR_SOURCE="$ROOT_DIR/packages/shared/src/unified-network-interceptor.ts"
          if [ -f "$INTERCEPTOR_SOURCE" ]; then
            echo "Copying interceptor sources..."
            mkdir -p "$ELECTRON_DIR/packages/shared/src"
            cp "$INTERCEPTOR_SOURCE" "$ELECTRON_DIR/packages/shared/src/"
            for dep in interceptor-common.ts feature-flags.ts interceptor-request-utils.ts; do
              if [ -f "$ROOT_DIR/packages/shared/src/$dep" ]; then
                cp "$ROOT_DIR/packages/shared/src/$dep" "$ELECTRON_DIR/packages/shared/src/"
              fi
            done
          else
            echo "WARNING: Interceptor source not found"
          fi

          echo "=== SDK preparation complete ==="

      - name: Build electron main
        run: bun run electron:build:main

      - name: Build electron preload
        run: bun run electron:build:preload

      - name: Build electron renderer
        run: bun run electron:build:renderer

      - name: Build electron resources
        run: bun run electron:build:resources

      - name: Copy assets
        run: bun run electron:build:assets

      - name: Build macOS x64
        run: |
          cd apps/electron
          npx electron-builder --config electron-builder.yml --mac --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build artifacts
        run: ls -la apps/electron/release/

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Craft-Agents-x64-dmg
          path: apps/electron/release/Craft-Agents-x64.dmg
          if-no-files-found: error

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Craft-Agents-x64-zip
          path: apps/electron/release/Craft-Agents-x64.zip
          if-no-files-found: warn
