name: Build macOS x64 (Intel)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: build-macos-x64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-x64:
    runs-on: macos-latest  # arm64 runner; cross-compile x64 via electron-builder --x64
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: bun install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================================
      # Official build-dmg.sh steps (adapted for CI cross-compilation)
      # ============================================================

      - name: Clean previous build artifacts
        run: |
          ELECTRON_DIR="apps/electron"
          rm -rf "$ELECTRON_DIR/vendor"
          rm -rf "$ELECTRON_DIR/node_modules/@anthropic-ai"
          rm -rf "$ELECTRON_DIR/packages"
          rm -rf "$ELECTRON_DIR/release"

      - name: Download Bun vendor binary (darwin-x64)
        run: |
          echo "=== Downloading Bun vendor binary ==="
          ELECTRON_DIR="apps/electron"
          BUN_VERSION="bun-v1.3.10"
          BUN_DOWNLOAD="bun-darwin-x64"

          mkdir -p "$ELECTRON_DIR/vendor/bun"
          TEMP_DIR=$(mktemp -d)

          # Download binary and checksums
          curl -fSL "https://github.com/oven-sh/bun/releases/download/${BUN_VERSION}/${BUN_DOWNLOAD}.zip" \
            -o "$TEMP_DIR/${BUN_DOWNLOAD}.zip"
          curl -fSL "https://github.com/oven-sh/bun/releases/download/${BUN_VERSION}/SHASUMS256.txt" \
            -o "$TEMP_DIR/SHASUMS256.txt"

          # Verify checksum
          echo "Verifying checksum..."
          cd "$TEMP_DIR"
          grep "${BUN_DOWNLOAD}.zip" SHASUMS256.txt | shasum -a 256 -c -
          cd - > /dev/null

          # Extract and install
          unzip -o "$TEMP_DIR/${BUN_DOWNLOAD}.zip" -d "$TEMP_DIR"
          cp "$TEMP_DIR/${BUN_DOWNLOAD}/bun" "$ELECTRON_DIR/vendor/bun/"
          chmod +x "$ELECTRON_DIR/vendor/bun/bun"
          rm -rf "$TEMP_DIR"

          echo "  Bun binary: $(ls -lh "$ELECTRON_DIR/vendor/bun/bun" | awk '{print $5}')"

      - name: Prepare SDK and dependencies for Electron
        run: |
          echo "=== Preparing SDK and dependencies ==="
          ELECTRON_DIR="apps/electron"
          ROOT_DIR="."

          # Helper: require path exists or fail
          require_path() {
            local path="$1"
            local desc="$2"
            local hint="$3"
            if [ ! -e "$path" ]; then
              echo "ERROR: $desc not found at $path"
              [ -n "$hint" ] && echo "$hint"
              exit 1
            fi
          }

          # 1. Copy SDK core
          SDK_SOURCE="$ROOT_DIR/node_modules/@anthropic-ai/claude-agent-sdk"
          require_path "$SDK_SOURCE" "SDK core" "Run 'bun install' from the repository root first."
          echo "Copying SDK core..."
          mkdir -p "$ELECTRON_DIR/node_modules/@anthropic-ai"
          rm -rf "$ELECTRON_DIR/node_modules/@anthropic-ai/claude-agent-sdk"
          cp -r "$SDK_SOURCE" "$ELECTRON_DIR/node_modules/@anthropic-ai/"

          # 2. Copy/resolve SDK binary for x64
          # On arm64 runner, the x64 binary won't be in node_modules, so fetch it
          SDK_BIN_PKG="claude-agent-sdk-darwin-x64"
          SDK_BIN_SOURCE="$ROOT_DIR/node_modules/@anthropic-ai/$SDK_BIN_PKG"
          if [ ! -d "$SDK_BIN_SOURCE" ]; then
            echo "Cross-arch build: $SDK_BIN_PKG not in node_modules — fetching from npm..."
            SDK_VERSION=$(node -p "require('./package.json').dependencies['@anthropic-ai/claude-agent-sdk']" | tr -d '"')
            PKG_TMP=$(mktemp -d)
            (
              cd "$PKG_TMP"
              npm pack "@anthropic-ai/${SDK_BIN_PKG}@${SDK_VERSION}" >/dev/null
              TARBALL=$(ls anthropic-ai-*.tgz | head -1)
              tar -xzf "$TARBALL"
            )
            SDK_BIN_SOURCE="$PKG_TMP/package"
          fi

          require_path "$SDK_BIN_SOURCE" "SDK native binary package ($SDK_BIN_PKG)" \
            "Run 'bun install' from the repository root, or check your network for the npm cross-fetch."

          echo "Staging SDK native binary as claude-agent-sdk-binary alias..."
          ALIAS_DEST="$ELECTRON_DIR/node_modules/@anthropic-ai/claude-agent-sdk-binary"
          rm -rf "$ALIAS_DEST"
          mkdir -p "$ALIAS_DEST"
          cp -r "$SDK_BIN_SOURCE/." "$ALIAS_DEST/"
          chmod +x "$ALIAS_DEST/claude"

          # Sanity check: binary should be ~210 MB
          BIN_SIZE=$(stat -f%z "$ALIAS_DEST/claude" 2>/dev/null || stat -c%s "$ALIAS_DEST/claude")
          if [ "$BIN_SIZE" -lt 50000000 ]; then
            echo "ERROR: claude binary is only $BIN_SIZE bytes (expected ~210 MB)"
            exit 1
          fi
          echo "  Native binary: $((BIN_SIZE / 1024 / 1024)) MB"

          # 3. Copy ripgrep
          RG_SOURCE="$ROOT_DIR/node_modules/@vscode/ripgrep"
          require_path "$RG_SOURCE" "@vscode/ripgrep" "Run 'bun install' and 'bun pm trust @vscode/ripgrep' first."
          require_path "$RG_SOURCE/bin/rg" "ripgrep binary" "@vscode/ripgrep postinstall did not run."
          echo "Copying @vscode/ripgrep..."
          mkdir -p "$ELECTRON_DIR/node_modules/@vscode"
          rm -rf "$ELECTRON_DIR/node_modules/@vscode/ripgrep"
          cp -r "$RG_SOURCE" "$ELECTRON_DIR/node_modules/@vscode/"

          # 4. Copy interceptor sources (for Pi subprocess)
          INTERCEPTOR_SOURCE="$ROOT_DIR/packages/shared/src/unified-network-interceptor.ts"
          require_path "$INTERCEPTOR_SOURCE" "Interceptor" "Ensure packages/shared/src/unified-network-interceptor.ts exists."
          echo "Copying interceptor (for Pi subprocess)..."
          mkdir -p "$ELECTRON_DIR/packages/shared/src"
          cp "$INTERCEPTOR_SOURCE" "$ELECTRON_DIR/packages/shared/src/"
          for dep in interceptor-common.ts feature-flags.ts interceptor-request-utils.ts; do
            if [ -f "$ROOT_DIR/packages/shared/src/$dep" ]; then
              cp "$ROOT_DIR/packages/shared/src/$dep" "$ELECTRON_DIR/packages/shared/src/"
            fi
          done

          echo "=== SDK preparation complete ==="

      - name: Build and copy MCP/Pi servers
        run: |
          echo "=== Building MCP and Pi servers ==="
          ELECTRON_DIR="apps/electron"
          ROOT_DIR="."

          # 1. Build session-mcp-server (Node/CJS target)
          echo "Building session-mcp-server..."
          mkdir -p packages/session-mcp-server/dist
          bun build packages/session-mcp-server/src/index.ts \
            --outfile packages/session-mcp-server/dist/index.js \
            --target node --format cjs
          if [ ! -f packages/session-mcp-server/dist/index.js ]; then
            echo "ERROR: session-mcp-server build failed"
            exit 1
          fi

          # Copy to electron resources
          mkdir -p "$ELECTRON_DIR/resources/session-mcp-server"
          cp packages/session-mcp-server/dist/index.js "$ELECTRON_DIR/resources/session-mcp-server/"
          echo "  session-mcp-server OK"

          # 2. Build pi-agent-server (Bun/ESM target, koffi external)
          if [ -d "packages/pi-agent-server/src" ]; then
            echo "Building pi-agent-server..."
            mkdir -p packages/pi-agent-server/dist
            bun build packages/pi-agent-server/src/index.ts \
              --outdir packages/pi-agent-server/dist \
              --target bun --format esm --external koffi
            if [ ! -f packages/pi-agent-server/dist/index.js ]; then
              echo "ERROR: pi-agent-server build failed"
              exit 1
            fi

            # Copy to electron resources
            PI_DEST="$ELECTRON_DIR/resources/pi-agent-server"
            mkdir -p "$PI_DEST"
            cp packages/pi-agent-server/dist/index.js "$PI_DEST/"

            # Copy koffi with platform-specific native binary
            KOFFI_SOURCE="$ROOT_DIR/node_modules/koffi"
            if [ -d "$KOFFI_SOURCE" ]; then
              KOFFI_DEST="$PI_DEST/node_modules/koffi"
              mkdir -p "$KOFFI_DEST"
              for entry in package.json index.js indirect.js index.d.ts lib; do
                if [ -e "$KOFFI_SOURCE/$entry" ]; then
                  cp -r "$KOFFI_SOURCE/$entry" "$KOFFI_DEST/"
                fi
              done
              # x64 native binary (cross-compile from arm64 runner)
              KOFFI_PLATFORM="darwin_x64"
              NATIVE_SRC="$KOFFI_SOURCE/build/koffi/$KOFFI_PLATFORM"
              if [ -d "$NATIVE_SRC" ]; then
                mkdir -p "$KOFFI_DEST/build/koffi/$KOFFI_PLATFORM"
                cp -r "$NATIVE_SRC/." "$KOFFI_DEST/build/koffi/$KOFFI_PLATFORM/"
              else
                echo "  WARNING: koffi native binary not found for $KOFFI_PLATFORM, copying all platforms"
                cp -r "$KOFFI_SOURCE/build" "$KOFFI_DEST/" 2>/dev/null || true
              fi
            else
              echo "  WARNING: koffi not found in node_modules"
            fi
            echo "  pi-agent-server OK"
          else
            echo "  WARNING: pi-agent-server source not found"
          fi

          # 3. Build bridge-mcp-server if present
          if [ -d "packages/bridge-mcp-server/src" ]; then
            echo "Building bridge-mcp-server..."
            mkdir -p packages/bridge-mcp-server/dist
            bun build packages/bridge-mcp-server/src/index.ts \
              --outfile packages/bridge-mcp-server/dist/index.js \
              --target node --format cjs 2>/dev/null || true
            if [ -f packages/bridge-mcp-server/dist/index.js ]; then
              mkdir -p "$ELECTRON_DIR/resources/bridge-mcp-server"
              cp packages/bridge-mcp-server/dist/index.js "$ELECTRON_DIR/resources/bridge-mcp-server/"
              echo "  bridge-mcp-server OK"
            fi
          fi

          echo "=== Server build complete ==="

      - name: Build WhatsApp worker
        run: |
          echo "=== Building WhatsApp worker ==="
          if [ -f "scripts/build-wa-worker.ts" ]; then
            bun run build:wa-worker
            echo "  WhatsApp worker built OK"
          else
            echo "  WARNING: build-wa-worker.ts not found, skipping"
          fi
          # Verify the output exists
          if [ -f "packages/messaging-whatsapp-worker/dist/worker.cjs" ]; then
            echo "  worker.cjs: $(ls -lh packages/messaging-whatsapp-worker/dist/worker.cjs | awk '{print $5}')"
          else
            echo "  WARNING: worker.cjs not found after build"
          fi

      - name: Build Electron app (full pipeline)
        run: |
          echo "=== Building Electron app ==="
          cd apps/electron
          # Run the full official build pipeline (lint + all build steps + validate)
          # Skip lint in CI to save time — focus on correctness
          bun run build:main
          bun run build:preload
          bun run build:preload-toolbar
          bun run build:interceptor
          bun run build:renderer
          bun run build:copy
          bun run build:validate
          echo "=== Electron build complete ==="

      - name: Package with electron-builder
        run: |
          cd apps/electron
          npx electron-builder --config electron-builder.yml --mac --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build output
        run: |
          echo "=== Build Artifacts ==="
          ls -lh apps/electron/release/
          echo ""
          # Verify DMG exists and has reasonable size
          DMG="apps/electron/release/Craft-Agents-x64.dmg"
          if [ -f "$DMG" ]; then
            DMG_SIZE=$(stat -f%z "$DMG" 2>/dev/null || stat -c%s "$DMG")
            echo "DMG size: $((DMG_SIZE / 1024 / 1024)) MB"
            if [ "$DMG_SIZE" -lt 50000000 ]; then
              echo "WARNING: DMG seems too small (< 50 MB), something may be wrong"
            fi
          else
            echo "ERROR: DMG not found!"
            exit 1
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Craft-Agents-x64-dmg
          path: apps/electron/release/Craft-Agents-x64.dmg
          if-no-files-found: error

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Craft-Agents-x64-zip
          path: apps/electron/release/Craft-Agents-x64.zip
          if-no-files-found: warn
